# ===== AutomaEyes — TEMPLATE config =====
# Salin otomatis jadi config.yaml saat app pertama jalan (kalau config.yaml belum ada).
# Isi KUNCI/SECRET (api_key, access_token) lewat menu Settings di aplikasi —
# TERSIMPAN ke config.yaml yang SUDAH di-gitignore, jadi tidak ikut ter-push ke GitHub.
app:
  name: AutomaEyes — Socket Holder Inspector
  version: 0.1.0
python:
  exe: python
  infer_script: python/infer.py
  train_script: python/train.py
arduino:
  port: COM3
  baud: 9600
  ok_signal: '0'
  ng_signal: '1'
  signal_on_ok: false
  # Handshake opsional (mode Live kontinu): tunggu Arduino/PLC mengirim token ini
  # sebagai tanda output/gerbang sudah menutup lagi, sebelum deteksi berikutnya.
  # Kosongkan (hapus/'') kalau Arduino tidak mengirim balasan → langsung lanjut.
  handshake_token: ''        # mis. 'C' atau 'READY' atau 'DONE'
  handshake_timeout_ms: 5000 # batas tunggu supaya tak menggantung
  # Mode tracking: sinyal gate saat part masuk (open) & keluar frame (close).
  open_signal: 'O'           # dikirim ketika part terdeteksi & diukur
  close_signal: 'C'          # dikirim ketika part keluar dari frame
model:
  confidence: 0.35
  iou: 0.45
  imgsz: 640
nvidia:
  api_key: ''
  base_url: https://api.cosmoshub.tech/v1
  model: qwen-3.7-max
self_learning:
  enabled: false
  api_key: ''
  retrain_every_n: 100
  uncertainty_low: 0.3
  uncertainty_high: 0.7
  ai_triage: false
  vision_model: qwen-3.7-max
auto_calibration:
  enabled: false
  api_key: ''
annotation:
  command: python python/run_label_studio.py start
  access_token: ''
paths:
  projects_root: projects
output:
  save_ok_images: false
