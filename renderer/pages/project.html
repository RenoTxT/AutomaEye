<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project — AutomaEyes</title>
<link rel="stylesheet" href="../css/style.css">
<script>window.LAYOUT_OPTS = { title: 'Project Dashboard', subtitle: 'AutomaEyes', mode: 'setting', showTotalStatus: false };</script>
</head>
<body>

<main>
    <a class="back" onclick="window.api.goTo('projects.html')">← Projects</a>
    <div class="page-header">
        <h1 id="pTitle">…</h1>
        <div class="row">
            <button class="btn primary" onclick="newModel()">+ New Model</button>
            <button class="btn" onclick="openAI()">🤖 AI Assistant</button>
            <button class="btn danger" onclick="deleteProject()">🗑 Hapus</button>
        </div>
    </div>
    <p class="muted" id="desc"></p>

    <section>
        <div class="section-title">Models</div>
        <div id="modelsList" style="background:var(--panel); border:1px solid var(--border); border-top:none;"></div>
    </section>

    <section style="margin-top: 16px;">
        <div class="section-title">Workflow (Palette Task View)</div>
        <div style="background:var(--panel); border:1px solid var(--border); border-top:none; padding:10px;">
            <div id="workflowView"></div>
            <div class="row">
                <button class="btn" onclick="editWorkflow()">✏️ Edit Workflow</button>
                <button class="btn primary" onclick="runWorkflow()">▶ Run Workflow</button>
            </div>
        </div>
    </section>
</main>

<script src="../js/common.js"></script>
<script>
const projectName = param('name');
let currentProject = null;

async function render() {
    if (!projectName) { window.api.goTo('projects.html'); return; }
    currentProject = await window.api.loadProject(projectName);
    document.getElementById('pTitle').textContent = currentProject.name;
    document.getElementById('desc').textContent = currentProject.description || '';

    const models = currentProject.models;
    const mList = document.getElementById('modelsList');
    if (!models.length) {
        mList.innerHTML = '<div style="padding:14px" class="muted">Belum ada model. Klik <strong>+ New Model</strong>.</div>';
    } else {
        const rows = await Promise.all(models.map(async m => {
            const stats = await window.api.modelStats(projectName, m.name);
            const trained = m.trained ? `<span class="badge ok">mAP ${(m.lastMAP || 0).toFixed(2)}</span>` : '<span class="badge">untrained</span>';
            const addons = (m.addons || []).map(a => `<span class="tag">${esc(a)}</span>`).join('') || '<span class="muted">—</span>';
            const classes = m.classes.map(c => `<span class="tag">${esc(c)}</span>`).join('');
            return `<tr>
                <td><strong>${esc(m.name)}</strong></td>
                <td>${esc(m.type)}</td>
                <td>${addons}</td>
                <td>${classes}</td>
                <td>${stats.train} / ${stats.annotated}</td>
                <td>${trained}</td>
                <td><button class="btn small" onclick="openModel('${esc(m.name)}')">Buka</button></td>
            </tr>`;
        }));
        mList.innerHTML = `<table class="table" style="border:0">
            <thead><tr><th>Nama</th><th>Type</th><th>Add-ons</th><th>Classes</th><th>Train / Anot</th><th>Status</th><th></th></tr></thead>
            <tbody>${rows.join('')}</tbody>
        </table>`;
    }

    const wf = document.getElementById('workflowView');
    if (!currentProject.workflow.steps.length) {
        wf.innerHTML = '<p class="muted">Workflow kosong. Buat model dulu lalu klik Edit Workflow.</p>';
    } else {
        const chain = currentProject.workflow.steps.map((s, i) => {
            const arrow = i < currentProject.workflow.steps.length - 1 ? '<span class="chain-arrow">→</span>' : '';
            return `<span class="chain-step">[${s.stepIndex}] ${esc(s.modelName)} <small>(${esc(s.category || 'Inspection')})</small></span> ${arrow}`;
        }).join('');
        wf.innerHTML = `<div class="chain">${chain}</div><p class="muted" style="font-size:11px">Aksi saat NG pertama: <strong>${currentProject.workflow.onFirstNG}</strong></p>`;
    }
}

function newModel() { window.api.goTo(`new_model.html?project=${encodeURIComponent(projectName)}`); }
function openModel(name) { window.api.goTo(`model.html?project=${encodeURIComponent(projectName)}&model=${encodeURIComponent(name)}`); }
function openAI() { window.api.goTo(`ai.html?project=${encodeURIComponent(projectName)}`); }
function editWorkflow() {
    if (!currentProject.models.length) { alert('Buat model dulu'); return; }
    window.api.goTo(`workflow.html?project=${encodeURIComponent(projectName)}`);
}
function runWorkflow() {
    if (!currentProject.workflow.steps.length) { alert('Workflow kosong'); return; }
    window.api.goTo(`run.html?project=${encodeURIComponent(projectName)}`);
}
async function deleteProject() {
    if (!confirm(`Hapus project "${projectName}"?`)) return;
    await window.api.deleteProject(projectName);
    window.api.goTo('projects.html');
}

render();
</script>
<script src="../js/layout.js"></script>
</body>
</html>
