<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Run — AutomaEyes</title>
<link rel="stylesheet" href="../css/style.css">
<script>window.LAYOUT_OPTS = { title: 'Run Workflow', subtitle: 'Live Inspection', mode: 'run', showTotalStatus: true };</script>
</head>
<body>

<main>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
        <a class="back" id="backLink">← Project</a>
        <div class="row">
            <button class="btn primary" onclick="startCam()" id="startBtn">▶ Start Camera</button>
            <button class="btn" onclick="capture()" id="captureBtn" disabled>📷 Capture & Inspect</button>
            <button class="btn" onclick="toggleLive()" id="liveBtn" disabled>🔴 Live</button>
            <button class="btn danger" onclick="stopCam()" id="stopBtn" disabled>⏹ Stop</button>
        </div>
    </div>

    <div class="run-layout">
        <!-- LEFT: Palette (workflow chain readonly) -->
        <div class="palette" id="palette"></div>

        <!-- CENTER: Image viewer + filmstrip -->
        <div class="camera-panel">
            <div class="image-viewer">
                <video id="cam" autoplay muted playsinline style="display:none"></video>
                <img id="snapImg" class="snapshot" style="display:none" />
                <canvas id="snapView" class="snapshot" style="display:none"></canvas>
                <canvas id="liveOverlay" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width:100%; max-height:100%; pointer-events:none; display:none"></canvas>
                <canvas id="snap" style="display:none"></canvas>
                <div id="noSignal" style="color:#666">📷 Klik Start Camera</div>
            </div>
        </div>

        <!-- RIGHT: Properties / Results -->
        <div class="results-panel">
            <div class="results-section">
                <h4>Live Settings</h4>
                <label style="display:block;font-size:12px;margin-bottom:4px">Interval (ms)
                    <input type="number" id="liveIntervalMs" value="120" min="50" step="10" style="width:90px" onchange="restartLive()"></label>
                <label style="display:block;font-size:12px;margin-bottom:4px">Confidence
                    <input type="number" id="liveConf" value="0.5" min="0.05" max="0.95" step="0.05" style="width:90px"></label>
                <label style="display:block;font-size:12px;margin-bottom:4px"><input type="checkbox" id="labelToggle" checked> Label model+addon</label>
                <p class="muted" id="fpsInfo" style="font-size:11px;margin:2px 0 0">FPS: — · infer — ms</p>
            </div>
            <div class="results-section" style="flex:1 1 0; min-height:120px; overflow-y:auto">
                <h4>Step Results</h4>
                <table class="table">
                    <thead><tr><th>#</th><th>Model</th><th>Verdict</th><th>Conf</th></tr></thead>
                    <tbody id="stepRows"><tr><td colspan="4" class="muted">Belum ada hasil</td></tr></tbody>
                </table>
            </div>
            <div class="results-section">
                <h4>Counter</h4>
                <div class="counter-grid">
                    <div class="counter-item"><div class="num" id="totalCount">0</div><div class="lbl">TOTAL</div></div>
                    <div class="counter-item"><div class="num" id="okCount" style="color:var(--ok)">0</div><div class="lbl">OK</div></div>
                    <div class="counter-item"><div class="num" id="ngCount" style="color:var(--ng)">0</div><div class="lbl">NG</div></div>
                </div>
                <p class="muted" style="margin-top:8px; font-size:11px">Avg cycle: <strong id="avgCycle">-</strong> ms</p>
                <p class="muted" style="margin-top:4px; font-size:11px">Ok Ratio: <strong id="okRatio">-</strong></p>
            </div>
            <div class="results-section" style="border:none">
                <h4>Info</h4>
                <p style="font-size:11px" class="muted">NG image: <code>outputs/YYYY-MM-DD/NNN-HHMM.jpg</code></p>
                <p style="font-size:11px" class="muted">Arduino sinyal: NG="1", OK="0"</p>
            </div>
        </div>
    </div>
</main>

<script src="../js/common.js"></script>
<script>
const projectName = param('project');
document.getElementById('backLink').onclick = () => window.api.goTo(`project.html?name=${encodeURIComponent(projectName)}`);

const CATEGORIES = ['Capture', 'Positioning', 'Inspection', 'Communication', 'Options'];
let stream = null;
let total = 0, okCount = 0, ngCount = 0, msSum = 0;
let projectData = null;
let filmstripItems = [];

async function init() {
    projectData = await window.api.loadProject(projectName);
    renderPalette();
}

function renderPalette(latestResult) {
    const palette = document.getElementById('palette');
    const stepMap = {};
    if (latestResult && latestResult.steps) {
        latestResult.steps.forEach(s => stepMap[s.stepIndex] = s);
    }
    palette.innerHTML = CATEGORIES.map(cat => {
        const catSteps = (projectData.workflow.steps || []).filter(s => s.category === cat);
        return `
            <div class="palette-cat">
                <div class="palette-header">
                    <div><span class="cat-icon"></span>${esc(cat)}</div>
                </div>
                <div class="palette-body">
                    ${catSteps.length ? catSteps.map(s => {
                        const r = stepMap[s.stepIndex];
                        const cls = r ? (r.verdict === 'OK' ? 'ok' : 'ng') : '';
                        return `<div class="palette-step">
                            <span class="step-num">${s.stepIndex}</span>
                            <span>${esc(s.modelName || s.label || s.tool || s.category)}</span>
                            <span class="verdict-dot ${cls}"></span>
                        </div>`;
                    }).join('') : '<div class="palette-empty">(kosong)</div>'}
                </div>
            </div>
        `;
    }).join('');
}

async function startCam() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        const video = document.getElementById('cam');
        video.srcObject = stream;
        video.style.display = 'block';
        document.getElementById('noSignal').style.display = 'none';
        document.getElementById('snapImg').style.display = 'none';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('captureBtn').disabled = false;
        document.getElementById('liveBtn').disabled = false;
        document.getElementById('stopBtn').disabled = false;
    } catch (e) { alert('Camera error: ' + e.message); }
}

function stopCam() {
    if (live) toggleLive();                       // matikan live dulu
    stream?.getTracks().forEach(t => t.stop());
    const sv = document.getElementById('snapView'); if (sv) sv.style.display = 'none';
    const lo = document.getElementById('liveOverlay'); if (lo) lo.style.display = 'none';
    document.getElementById('cam').style.display = 'none';
    document.getElementById('noSignal').style.display = 'block';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('captureBtn').disabled = true;
    document.getElementById('liveBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
}

let live = false, liveTimer = null, busy = false, revertTimer = null;

let fpsSamples = [];
function liveMs() { return Math.max(50, parseInt(document.getElementById('liveIntervalMs').value) || 120); }
function restartLive() {
    if (!live) return;
    clearInterval(liveTimer);
    liveTimer = setInterval(inspectFrame, liveMs());
}
function updateFps(cycleMs, result) {
    fpsSamples.push(cycleMs); if (fpsSamples.length > 8) fpsSamples.shift();
    const avg = fpsSamples.reduce((a, b) => a + b, 0) / fpsSamples.length;
    const fps = avg > 0 ? 1000 / avg : 0;
    const infer = (result && result.totalMS != null) ? Math.round(result.totalMS) : Math.round(cycleMs);
    const el = document.getElementById('fpsInfo');
    if (el) el.textContent = `FPS: ${fps.toFixed(1)} · infer ${infer} ms`;
}

// Ambil satu frame dari kamera → dataURL. null bila kamera belum menyuplai frame.
function grabDataUrl() {
    const video = document.getElementById('cam');
    if (!video || !video.videoWidth || !video.videoHeight) return null;
    const canvas = document.getElementById('snap');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.85);
}

// Ambil frame + inspeksi + gambar kotak deteksi. Dipakai manual & live.
async function inspectFrame(forceFull) {
    if (busy) return;
    const dataUrl = grabDataUrl();
    if (!dataUrl) {
        if (!live) alert('Kamera belum siap / gagal ambil frame. Coba Stop lalu Start Camera lagi.');
        return;
    }
    busy = true;
    // Live: video TETAP jalan (kotak digambar di overlay transparan). Manual: drawOverlay yang sembunyikan video.
    const conf = parseFloat(document.getElementById('liveConf').value);
    const t0 = performance.now();
    try {
        // Semua model (termasuk Socket Measurement) jalan saat Live maupun Capture.
        // (Presence gate tetap aktif: kalau part tidak ada, model berat otomatis dilewati.)
        const result = await window.api.inspect(projectName, dataUrl, { confidence: isNaN(conf) ? undefined : conf });
        updateFps(performance.now() - t0, result);
        renderResult(result, dataUrl);              // drawOverlay menampilkan kotak
    } catch (e) {
        if (!live) alert('Inspect error: ' + e.message);
        else console.warn('inspect:', e.message);
    } finally { busy = false; }
}

// Tombol Capture & Inspect — inspeksi PENUH (Socket Measurement + ukuran GD&T).
// Bisa ditekan kapan saja: kalau Live sedang jalan, dihentikan dulu supaya hasil ukur tidak tertimpa.
async function capture() {
    if (revertTimer) clearTimeout(revertTimer);
    if (live) toggleLive();                       // stop Live agar loop presence tidak menimpa hasil ukur
    // tunggu inferensi live yang mungkin masih berjalan (guard maks ~30 dtk)
    let guard = 0;
    while (busy && guard++ < 300) await new Promise(r => setTimeout(r, 100));
    await inspectFrame(true);                      // full: semua model → ukuran keluar (gambar dibekukan)
}

// Mode Live — inspeksi otomatis berulang, kotak deteksi terus diperbarui.
function toggleLive() {
    live = !live;
    const btn = document.getElementById('liveBtn');
    if (live) {
        if (revertTimer) clearTimeout(revertTimer);
        btn.textContent = '⏸ Stop Live';
        btn.classList.add('primary');
        document.getElementById('captureBtn').disabled = false;   // tetap bisa Capture penuh saat Live
        // video tetap tampil; snapView (frame beku) disembunyikan supaya tidak menutupi video live
        const sv = document.getElementById('snapView'); if (sv) sv.style.display = 'none';
        document.getElementById('cam').style.display = 'block';
        liveTimer = setInterval(inspectFrame, liveMs());
        inspectFrame();
    } else {
        btn.textContent = '🔴 Live';
        btn.classList.remove('primary');
        document.getElementById('captureBtn').disabled = false;
        clearInterval(liveTimer); liveTimer = null;
        const lo = document.getElementById('liveOverlay'); if (lo) lo.style.display = 'none';
        const sv = document.getElementById('snapView'); if (sv) sv.style.display = 'none';
        document.getElementById('cam').style.display = 'block';
    }
}

const DET_COLORS = ['#22c55e', '#ef4444', '#f59e0b', '#3b82f6', '#a855f7', '#ec4899', '#06b6d4', '#84cc16'];

// Kepala panah kecil di titik (x,y) mengarah ke (dx,dy).
function arrowHead(ctx, x, y, dx, dy, size) {
    const ang = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - size * Math.cos(ang - 0.5), y - size * Math.sin(ang - 0.5));
    ctx.lineTo(x - size * Math.cos(ang + 0.5), y - size * Math.sin(ang + 0.5));
    ctx.closePath(); ctx.fill();
}
// Label mm dengan latar warna di titik tengah panah.
function dimLabel(ctx, mx, my, text, col, fs) {
    const w = ctx.measureText(text).width;
    ctx.fillStyle = col; ctx.fillRect(mx - w / 2 - 3, my - (fs + 4) / 2, w + 6, fs + 4);
    ctx.fillStyle = '#fff'; ctx.fillText(text, mx - w / 2, my - (fs + 4) / 2 + 2);
}
// Panah dimensi HORIZONTAL dari x0..x1 pada tinggi y.
function dimArrowH(ctx, x0, x1, y, text, col, fs) {
    if (x1 - x0 < 8) return;
    const s = Math.max(6, fs * 0.6);
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
    arrowHead(ctx, x0, y, -1, 0, s); arrowHead(ctx, x1, y, 1, 0, s);
    dimLabel(ctx, (x0 + x1) / 2, y, text, col, fs);
}
// Panah dimensi VERTIKAL dari y0..y1 pada posisi x.
function dimArrowV(ctx, x, y0, y1, text, col, fs) {
    if (y1 - y0 < 8) return;
    const s = Math.max(6, fs * 0.6);
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    arrowHead(ctx, x, y0, 0, -1, s); arrowHead(ctx, x, y1, 0, 1, s);
    dimLabel(ctx, x, (y0 + y1) / 2, text, col, fs);
}

// Gambar KOTAK deteksi tiap objek (label kelas + confidence),
// plus angka ukuran GD&T di atas kotak bila ada. Dipakai untuk snapView (beku) & liveOverlay (transparan).
function drawBoxes(ctx, result, cvWidth) {
    const fs = Math.max(12, Math.round(cvWidth / 85));
    ctx.font = `bold ${fs}px sans-serif`; ctx.textBaseline = 'top';
    ctx.lineWidth = Math.max(2, Math.round(cvWidth / 500));
    const seen = new Set();
    const rich = document.getElementById('labelToggle') ? document.getElementById('labelToggle').checked : true;
    (result.steps || []).forEach(s => {
        const addon = (s.checks && s.checks[0]) ? s.checks[0].addon : null;
        (s.detections || []).forEach(d => {
            if (d.x1 == null) return;
            const key = `${Math.round(d.x1)},${Math.round(d.y1)},${Math.round(d.x2)},${Math.round(d.y2)},${d.class_id}`;
            if (seen.has(key)) return; seen.add(key);

            const gdt = d.gdt ? (Array.isArray(d.gdt) ? d.gdt : [d.gdt]) : null;
            const baseCol = DET_COLORS[(d.class_id || 0) % DET_COLORS.length];
            // merah kalau ada yang gagal (ok===false); hijau kalau ada yang lulus; biru = ukuran mentah (ok===null)
            const boxCol = gdt
                ? (gdt.some(l => l.ok === false) ? '#ef4444' : gdt.some(l => l.ok === true) ? '#22c55e' : '#3b82f6')
                : baseCol;
            ctx.strokeStyle = boxCol;
            ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
            const cls = d.class_name || ('#' + (d.class_id != null ? d.class_id : '?'));
            if (gdt) {
                // Gambar GARIS PANAH DIMENSI di sisi yang diukur (vertikal=tinggi, horizontal=lebar/diameter).
                let stackTop = 0;   // untuk label yang tak punya orientasi (fallback)
                gdt.forEach(l => {
                    const col = l.ok === false ? '#ef4444' : l.ok === true ? '#22c55e' : '#3b82f6';
                    if (l.kind === 'long') {
                        dimArrowV(ctx, d.x1 + Math.max(6, fs * 0.5), d.y1 + 3, d.y2 - 3, l.text, col, fs);
                    } else if (l.kind === 'short') {
                        dimArrowH(ctx, d.x1 + 3, d.x2 - 3, d.y2 - Math.max(6, fs * 0.5), l.text, col, fs);
                    } else if (l.kind === 'dia') {
                        dimArrowH(ctx, d.x1 + 3, d.x2 - 3, (d.y1 + d.y2) / 2, l.text, col, fs);
                    } else {
                        const t = `${cls} ${l.text}`, w2 = ctx.measureText(t).width;
                        const gy = Math.max(0, d.y1 - fs - 5 - stackTop); stackTop += fs + 5;
                        ctx.fillStyle = col; ctx.fillRect(d.x1, gy, w2 + 10, fs + 5);
                        ctx.fillStyle = '#fff'; ctx.fillText(t, d.x1 + 5, gy + 2);
                    }
                });
            } else {
                const conf = (typeof d.confidence === 'number') ? ` ${Math.round(d.confidence * 100)}%` : '';
                const model = s.modelName || s.label || '';
                const lab = rich ? `${model}${addon ? ' · ' + addon : ''} · ${cls}${conf}` : `${cls}${conf}`;
                const tw = ctx.measureText(lab).width;
                const ly = Math.max(0, d.y1 - fs - 5);
                ctx.fillStyle = baseCol; ctx.fillRect(d.x1, ly, tw + 10, fs + 5);
                ctx.fillStyle = '#fff'; ctx.fillText(lab, d.x1 + 5, ly + 2);
            }
        });
    });
}

// MANUAL: frame beku + kotak di snapView (video disembunyikan).
function drawOverlay(result, dataUrl) {
    const cv = document.getElementById('snapView');
    if (!cv) return;
    const img = new Image();
    img.onload = () => {
        cv.width = img.naturalWidth; cv.height = img.naturalHeight;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0);
        drawBoxes(ctx, result, cv.width);
        document.getElementById('snapImg').style.display = 'none';
        document.getElementById('cam').style.display = 'none';
        cv.style.display = 'block';
    };
    img.src = dataUrl;
}

// LIVE: kotak TRANSPARAN di atas video yang tetap jalan (tidak beku/blink).
function drawLiveOverlay(result) {
    const video = document.getElementById('cam');
    const cv = document.getElementById('liveOverlay');
    if (!cv || !video || !video.videoWidth) return;
    if (cv.width !== video.videoWidth) cv.width = video.videoWidth;
    if (cv.height !== video.videoHeight) cv.height = video.videoHeight;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);   // transparan → video tembus
    drawBoxes(ctx, result, cv.width);
    cv.style.display = 'block';
}

function renderResult(result, dataUrl) {
    // Update Total Status via layout.js helper (opsional — run.html tak selalu punya badge)
    if (typeof window.setTotalStatus === 'function') window.setTotalStatus(result.finalVerdict);
    if (live) drawLiveOverlay(result); else drawOverlay(result, dataUrl);

    // Update step rows
    document.getElementById('stepRows').innerHTML = result.steps.map(s => `
        <tr class="${s.verdict === 'OK' ? 'ok' : 'ng'}">
            <td>${s.stepIndex}</td>
            <td>${esc(s.modelName || s.label || s.category)}${s.reason ? `<br><span class="muted" style="font-size:11px">${esc(s.reason)}</span>` : ''}</td>
            <td>${esc(s.verdict)}</td>
            <td>${(s.confidence || 0).toFixed(2)}</td>
        </tr>
    `).join('') || '<tr><td colspan="4" class="muted">Belum ada hasil</td></tr>';

    // Update palette with verdict dots
    renderPalette(result);

    // Self-learning: tampilkan notifikasi bila hard sample terkumpul
    const sl = result.selfLearning;
    let slEl = document.getElementById('slNotice');
    if (!slEl) {
        slEl = document.createElement('p');
        slEl.id = 'slNotice';
        slEl.className = 'muted';
        slEl.style.cssText = 'font-size:11px;margin-top:6px';
        const anchor = document.getElementById('stepRows').closest('table') || document.getElementById('stepRows');
        anchor.parentNode.insertBefore(slEl, anchor.nextSibling);
    }
    if (sl && sl.collected) {
        let msg = `🧠 Self-learning: hard sample terkumpul untuk <strong>${esc(sl.modelName)}</strong> ` +
            `(pending ${sl.count})` + (sl.needsRetrain ? ' — <strong style="color:#f59e0b">ambang retrain tercapai, siap retraining</strong>' : '');
        const ai = sl.aiSuggestion;
        if (ai && ai.text) {
            const col = ai.verdict === 'NG' ? '#ef4444' : (ai.verdict === 'OK' ? '#22c55e' : '#64748b');
            msg += `<br>🤖 Saran AI (VLM, tinjau): <strong style="color:${col}">${esc(ai.verdict || '—')}</strong> — ${esc(ai.text)}`;
        } else if (ai && ai.error) {
            msg += `<br><span style="color:#94a3b8">🤖 AI triage gagal: ${esc(ai.error)}</span>`;
        }
        slEl.innerHTML = msg;
    } else if (sl && sl.reason === 'disabled') {
        slEl.textContent = '';
    }

    // Counters
    total++;
    if (result.finalVerdict === 'OK') okCount++; else ngCount++;
    msSum += (result.totalMS || 0);
    document.getElementById('totalCount').textContent = total;
    document.getElementById('okCount').textContent = okCount;
    document.getElementById('ngCount').textContent = ngCount;
    document.getElementById('avgCycle').textContent = total ? Math.round(msSum / total) : '-';
    document.getElementById('okRatio').textContent = total ? Math.round((okCount / total) * 100) + '%' : '-';
}

init();
</script>
</body>
</html>
